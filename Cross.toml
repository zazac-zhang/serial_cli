# Cross-compilation configuration for cross tool
# See https://github.com/cross-rs/cross#configuration

[build]
# Default build options
xargo = false
default-target = "x86_64-unknown-linux-gnu"

# Windows targets (using GNU toolchain for better cross-platform support)
[target.x86_64-pc-windows-gnu]
image = "ghcr.io/cross-rs/x86_64-pc-windows-gnu:latest"

[target.x86_64-pc-windows-gnullvm]
image = "ghcr.io/cross-rs/x86_64-pc-windows-gnullvm:latest"

# Linux targets
[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:latest"

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest"

# macOS targets (these are typically built natively)
[target.x86_64-apple-darwin]
# No cross image needed - build natively on macOS

[target.aarch64-apple-darwin]
# No cross image needed - build natively on macOS
