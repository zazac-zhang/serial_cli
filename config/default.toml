# Serial CLI - Default Configuration

[serial]
# Default serial port configuration
baudrate = 115200
databits = 8
stopbits = 1
parity = "none"
timeout_ms = 1000

[logging]
# Logging configuration
level = "info"
format = "text"  # "text" or "json"
file = ""  # Leave empty for console output

[lua]
# Lua runtime configuration
memory_limit_mb = 128
timeout_seconds = 300
enable_sandbox = true

[task]
# Task scheduler configuration
max_concurrent = 10
default_timeout_seconds = 60

[output]
# Output configuration
json_pretty = true
show_timestamp = true
