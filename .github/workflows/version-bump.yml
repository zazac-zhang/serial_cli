name: Version Bump

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version increment type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Determine version bump
        id: version
        run: |
          # Get current version from Cargo.toml
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT

          # Auto-detect bump type from commits
          if [ "${{ github.event.inputs.increment }}" = "auto" ]; then
            COMMITS_SINCE_TAG=$(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --oneline)
            if echo "$COMMITS_SINCE_TAG" | grep -q "^.*feat.*BREAKING"; then
              INCREMENT="major"
            elif echo "$COMMITS_SINCE_TAG" | grep -q "^feat"; then
              INCREMENT="minor"
            else
              INCREMENT="patch"
            fi
          else
            INCREMENT="${{ github.event.inputs.increment }}"
          fi
          echo "increment=$INCREMENT" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.version.outputs.current_version }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          case "${{ steps.version.outputs.increment }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update Cargo.toml
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" Cargo.toml

      - name: Generate changelog
        run: |
          git-cliff --unreleased --tag v${{ steps.bump.outputs.new_version }} --output CHANGELOG.md
          # Prepend existing changelog if exists
          if [ -f CHANGELOG.md.orig ]; then
            cat CHANGELOG.md.orig >> CHANGELOG.md
            rm CHANGELOG.md.orig
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          branch: bump-v${{ steps.bump.outputs.new_version }}
          title: "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          body: |
            Automated version bump to v${{ steps.bump.outputs.new_version }}

            **Changes:**
            - Updated Cargo.toml version
            - Generated CHANGELOG.md

            **Increment type:** ${{ steps.version.outputs.increment }}
          labels: version-bump
