name: GUI Release

on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: 'CLI base version (e.g., v1.2.3)'
        required: true
      gui_increment:
        description: 'GUI version increment'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  build-gui:
    name: Build GUI for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: serial-cli-gui-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: serial-cli-gui-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: serial-cli-gui-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: serial-cli-gui-windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-tauri-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: src-ui/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('src-ui/package-lock.json') }}

      - name: Install GUI dependencies
        run: |
          cd src-ui
          npm install

      - name: Build frontend
        run: |
          cd src-ui
          npm run build

      - name: Build Tauri application
        run: |
          cd src-tauri
          cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/*
          if-no-files-found: error

  test-gui:
    name: Test GUI Artifacts
    needs: build-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure
        run: ls -R ./artifacts

      - name: Run installation tests
        run: |
          chmod +x scripts/gui/test-install.sh
          scripts/gui/test-install.sh ./artifacts

  create-gui-release:
    name: Create GUI Release
    needs: [build-gui, test-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate release notes
        id: notes
        run: |
          CLI_VERSION="${{ github.event.inputs.cli_version }}"
          GUI_VERSION="v$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          echo "cli_version=$CLI_VERSION" >> $GITHUB_OUTPUT
          echo "gui_version=$GUI_VERSION" >> $GITHUB_OUTPUT

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            for file in *; do
              if [ -f "$file" ]; then
                sha256sum "$file" > "$file.sha256"
              fi
            done
            cd ..
          done

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*/
          draft: false
          prerelease: false
          tag_name: ${{ steps.notes.outputs.gui_version }}
          name: "GUI ${{ steps.notes.outputs.gui_version }}"
          body: |
            ## Serial CLI GUI ${{ steps.notes.outputs.gui_version }}

            **基于 CLI v${{ steps.notes.outputs.cli_version }}**

            ### 📥 下载方式

            **macOS (Apple Silicon)**
            - [DMG 安装包](serial-cli-gui-macos-arm64.dmg)

            **macOS (Intel)**
            - [DMG 安装包](serial-cli-gui-macos-x86_64.dmg)

            **Windows**
            - [安装程序](serial-cli-gui-windows-amd64-setup.exe)

            **Linux (x86_64)**
            - [AppImage](serial-cli-gui-linux-amd64.AppImage)
            - [deb 包](serial-cli-gui_*.deb)

            ### ✨ 功能特性

            - 🖥️ 图形化串口管理
            - 📊 实时数据监控
            - 📜 Lua 脚本编辑器
            - 🔧 协议配置界面

            ### 📚 安装指南

            **macOS**:
            ```bash
            hdiutil attach serial-cli-gui-macos-arm64.dmg
            cp -r /Volumes/Serial\ CLI\ GUI/Serial\ CLI\ GUI.app /Applications/
            ```

            **Windows**:
            运行安装程序即可

            **Linux**:
            ```bash
            chmod +x serial-cli-gui-linux-amd64.AppImage
            ./serial-cli-gui-linux-amd64.AppImage
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
