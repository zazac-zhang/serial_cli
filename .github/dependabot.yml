version: 2
updates:
  # Rust依赖更新
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "zazac-zhang"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "Update"
      include: "scope"
    ignore:
      # 忽略某些不重要的更新
      - dependency-name: "libc"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "tokio"
        update-types: ["version-update:semver-patch"]

  # GitHub Actions更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "github-actions"
      - "dependencies"
    commit-message:
      prefix: "Update"
