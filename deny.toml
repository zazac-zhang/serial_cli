# 配置文件

[advisories]
# 数据库路径
db-path = "~/.cargo/advisory-db"
# 数据库URL
db-urls = ["https://github.com/rustsec/advisory-db"]
# 漏洞处理策略
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
# 许可证策略
unlicensed = "deny"
allow-osi-fsf-free = "both"
copyleft = "warn"
default = "deny"

# 允许的许可证列表
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]

# 需要澄清的许可证
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# 多版本检查
multiple-versions = "warn"
# 通配符依赖
wildcards = "allow"
# 高亮所有显示
highlight = "all"

# 跳过特定的重复版本
[[bans.skip]]
name = "libc"
version = "0.2.137"

# 跳过特定的树重复
[[bans.skip-tree]]
name = "windows-sys"

[sources]
# 未知注册表
unknown-registry = "warn"
# 未知git源
unknown-git = "warn"
# 允许的注册表
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# 允许的git源
allow-git = []
